<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Stacker Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Stage Stacker <span>v0.1.0</span></h1>
        <div id="status-bar">Statut : <span id="status">En attente</span></div>
        <div class="display-controls">
            <select id="screen-selector">
                <option value="1">Écran 1</option>
                <option value="2">Écran 2</option>
                <option value="3">Écran 3</option>
                <option value="4">Écran 4</option>
            </select>
            <button id="btn-fullscreen-toggle" onclick="handleFullscreenToggle()" class="btn-off">
                OFF AIR
            </button>
            <button id="btn-stopall" onclick="stopAllCue()" class="btn-secondary">STOP ALL</button>
        </div>
    </header>

    <main>
        <section class="sidebar">
            <button id="btn-new" class="btn-primary" style="margin-bottom: 10px;" onclick="createStack()">+ Nouveau Show</button>
            <button id="btn-save" class="btn-secondary" style="margin-bottom: 10px;" onclick="saveStack()">Enregistrer</button>
            <h3>Stacks disponibles</h3>
            <div id="stack-list">Chargement...</div>
            <div class="add-controls">
                <button onclick="addCue('VideoPlugin')">+ Vidéo</button>
                <button onclick="addCue('AudioPlugin')">+ Audio</button>
            </div>
            <div class="transport-controls">
                <button id="btn-stop-all" class="btn-transport btn-red" onclick="stopAllCue()" title="Stop All">
                    <span class="icon">⏹</span>
                </button>
                <button id="btn-next-cue" class="btn-transport btn-green" onclick="triggerNextCue()" title="Next Cue">
                    <span class="icon">⏭</span>
                </button>
                <div class="transport-subgroup">
                    <button class="btn-transport btn-grey" onclick="pauseAllCues()" title="Pause All">
                        <span class="icon">⏸</span>
                    </button>
                    <button class="btn-transport btn-grey" onclick="resumeAllCues()" title="Resume All">
                        <span class="icon">▶</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="content">
            <div id="show-info">
                <h2>Aucun show chargé</h2>
            </div>

            <div class="cue-grid-container">
                <div class="cue-grid-header">
                    <div>#</div>
                    <div>Cue name</div>
                    <div>Trigger</div>
                    <div>Duration</div>
                    <div>Delay</div>
                    <div>Actions</div>
                    <div>Timeline (Waterfall)</div>
                </div>
                <div id="cues-container">
                    <!-- Les lignes Grid seront injectées ici -->
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
